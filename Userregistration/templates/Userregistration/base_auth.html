<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% endblock %} | Sayt nomi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: #4f6ef7;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 600;
      color: #e8eaf0;
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      color: #e8eaf0;
      margin-bottom: 0.5rem;
    }

    .card-subtitle {
      font-size: 14px;
      color: #7a7f9a;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #9da3bb;
      margin-bottom: 0.5rem;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: #12141e;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 15px;
      color: #e8eaf0;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #4f6ef7;
    }

    input::placeholder {
      color: #3d4159;
    }

    .btn {
      width: 100%;
      background: #4f6ef7;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.85rem;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .btn:hover {
      background: #3d5ce0;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #7a7f9a;
      text-decoration: none;
      margin-top: 1.5rem;
      justify-content: center;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #4f6ef7;
    }

    .back-link svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
    }

    .alert {
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 13px;
      margin-bottom: 1.25rem;
      line-height: 1.5;
    }

    .alert-error {
      background: rgba(220, 60, 60, 0.12);
      border: 1px solid rgba(220, 60, 60, 0.25);
      color: #f07070;
    }

    .alert-success {
      background: rgba(40, 180, 120, 0.12);
      border: 1px solid rgba(40, 180, 120, 0.25);
      color: #5dd4a0;
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #7a7f9a;
      padding: 0;
      display: flex;
    }

    .toggle-password svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
    }

    .toggle-password:hover {
      color: #4f6ef7;
    }

    .password-hint {
      font-size: 12px;
      color: #7a7f9a;
      margin-top: 0.4rem;
    }

    .success-icon {
      width: 56px;
      height: 56px;
      background: rgba(40, 180, 120, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .success-icon svg {
      width: 28px;
      height: 28px;
      stroke: #5dd4a0;
      fill: none;
    }

    .text-center {
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
