{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayZone.uz | Kirish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body class="login-page">

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-12 col-md-5 col-lg-4">

                <div class="login-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <a href="/" class="login-logo text-decoration-none">
                            Play<span>Zone.uz</span>
                        </a>
                    </div>

                    <h2 class="text-center fw-bold mb-1">Xush kelibsiz!</h2>
                    <p class="text-center text-muted small mb-4">Tizimga kirish uchun ma'lumotlarni kiriting</p>

                    <form method="post" novalidate>
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Login yoki Email</label>
                            <input type="text" name="username" class="form-control login-input" placeholder="username" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Parol</label>
                            <div class="input-group">
                                <input type="password" name="password" id="login_pw_input" class="form-control login-input" placeholder="••••••••" required>
                                <button class="btn login-toggle-btn" type="button" onclick="toggleLoginPassword()">
                                    <span id="login_pw_icon">👁️</span>
                                </button>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input login-check" type="checkbox" id="remember">
                                <label class="form-check-label small text-muted" for="remember">Eslab qol</label>
                            </div>
                            <a href="#" class="small login-link text-decoration-none fw-bold">Parolni unutdingizmi?</a>
                        </div>

                        <button type="submit" class="btn login-btn-primary w-100 fw-bold py-2 mb-3">
                            Kirish
                        </button>
                    </form>

                    <p class="text-center small text-muted mt-4">
                        Hisobingiz yo'qmi? <a href="{% url 'Userregistration:signup' %}" class="login-link text-decoration-none fw-bold">Ro'yxatdan o'ting</a>
                    </p>
                </div>

            </div>
        </div>
    </div>

    <script src="{% static 'js/login.js' %}"></script>
</body>
</html>
