<canvas id="c" style="display:block;width:100%;background:#0a0a0f;cursor:none;border-radius:12px;touch-action:none"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 700;
canvas.height = 420;

const mouse = {x: 350, y: 210};
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (canvas.width / r.width);
  mouse.y = (e.clientY - r.top) * (canvas.height / r.height);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.touches[0].clientX - r.left) * (canvas.width / r.width);
  mouse.y = (e.touches[0].clientY - r.top) * (canvas.height / r.height);
}, {passive: false});

const TRAIL_LEN = 60;
const trail = Array.from({length: TRAIL_LEN}, () => ({x: 350, y: 210}));

const SPINE = 40;
const SEG = 11;
const spine = Array.from({length: SPINE}, (_, i) => ({x: 350 - i*SEG, y: 210}));

function followChain(chain, tx, ty, segLen) {
  chain[0].x = tx; chain[0].y = ty;
  for (let i = 1; i < chain.length; i++) {
    const dx = chain[i].x - chain[i-1].x;
    const dy = chain[i].y - chain[i-1].y;
    const d = Math.sqrt(dx*dx + dy*dy) || 1;
    chain[i].x = chain[i-1].x + (dx/d)*segLen;
    chain[i].y = chain[i-1].y + (dy/d)*segLen;
  }
}

function ang(a, b) { return Math.atan2(b.y - a.y, b.x - a.x); }

// Speed tracking
let prevTarget = {x: 350, y: 210};
let speed = 0;
let walkPhase = 0;

// Leg definitions: spineIdx, side, restHipAngle offset
// Each leg has a planted foot position and a swing state
const legDefs = [
  {spineIdx: 6,  side: -1, phaseOffset: 0},
  {spineIdx: 6,  side:  1, phaseOffset: Math.PI},
  {spineIdx: 16, side:  1, phaseOffset: 0},
  {spineIdx: 16, side: -1, phaseOffset: Math.PI},
];

const legState = legDefs.map((def, i) => ({
  footX: 0, footY: 0,
  planted: true,
  swingT: 0,
  fromX: 0, fromY: 0,
  toX: 0, toY: 0,
}));

function getHipPos(def) {
  const seg = spine[def.spineIdx];
  const prev = spine[def.spineIdx - 1] || seg;
  const a = ang(prev, seg);
  const perp = a + Math.PI/2;
  return {
    x: seg.x + def.side * Math.cos(perp) * 6,
    y: seg.y + def.side * Math.sin(perp) * 6,
    bodyAngle: a
  };
}

function getIdealFoot(def, hipPos) {
  const a = hipPos.bodyAngle;
  const perp = a + Math.PI/2;
  const reach = 52;
  const forward = 18;
  return {
    x: hipPos.x + def.side * Math.cos(perp) * reach + Math.cos(a) * forward,
    y: hipPos.y + def.side * Math.sin(perp) * reach + Math.sin(a) * forward,
  };
}

// Init foot positions
legDefs.forEach((def, i) => {
  const hip = getHipPos(def);
  const ideal = getIdealFoot(def, hip);
  legState[i].footX = ideal.x;
  legState[i].footY = ideal.y;
});

function solveIK(hipX, hipY, footX, footY, len1, len2) {
  const dx = footX - hipX, dy = footY - hipY;
  let dist = Math.sqrt(dx*dx + dy*dy);
  const maxReach = len1 + len2 - 1;
  if (dist > maxReach) {
    dist = maxReach;
    const a = Math.atan2(dy, dx);
    footX = hipX + Math.cos(a)*dist;
    footY = hipY + Math.sin(a)*dist;
  }
  const cosKnee = (dist*dist + len1*len1 - len2*len2) / (2*dist*len1);
  const kneeAng = Math.acos(Math.max(-1, Math.min(1, cosKnee)));
  const dirAng = Math.atan2(footY - hipY, footX - hipX);
  return {
    kneeX: hipX + Math.cos(dirAng + kneeAng) * len1,
    kneeY: hipY + Math.sin(dirAng + kneeAng) * len1,
    footX, footY
  };
}

function drawLeg(def, state, isLeft) {
  const hip = getHipPos(def);
  const len1 = 36, len2 = 30;
  const ik = solveIK(hip.x, hip.y, state.footX, state.footY, len1, len2);

  // Lift foot during swing
  const liftY = state.planted ? 0 : -Math.sin(state.swingT * Math.PI) * 14;

  ctx.strokeStyle = 'rgba(190,220,190,0.75)';
  ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.moveTo(hip.x, hip.y);
  ctx.lineTo(ik.kneeX, ik.kneeY);
  ctx.stroke();

  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(ik.kneeX, ik.kneeY);
  ctx.lineTo(ik.footX, ik.footY + liftY);
  ctx.stroke();

  // Knee joint dot
  ctx.beginPath();
  ctx.arc(ik.kneeX, ik.kneeY, 2.5, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(190,220,190,0.85)';
  ctx.fill();

  // Hip joint
  ctx.beginPath();
  ctx.arc(hip.x, hip.y, 2, 0, Math.PI*2);
  ctx.fill();

  // Toes
  const footA = Math.atan2(ik.footY - ik.kneeY, ik.footX - ik.kneeX);
  const fx = ik.footX, fy = ik.footY + liftY;
  for (let f = 0; f < 3; f++) {
    const fa = footA + (f - 1) * 0.38;
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.lineTo(fx + Math.cos(fa)*10, fy + Math.sin(fa)*10);
    ctx.lineWidth = 0.7;
    ctx.stroke();
  }
}

function drawSpine() {
  for (let i = 0; i < spine.length - 1; i++) {
    const t = i / spine.length;
    const w = 7*(1-t) + 0.5*t;
    const a = ang(spine[i], spine[i+1]);
    const perp = a + Math.PI/2;
    const cx = Math.cos(perp), cy = Math.sin(perp);
    ctx.beginPath();
    ctx.moveTo(spine[i].x + cx*w, spine[i].y + cy*w);
    ctx.lineTo(spine[i+1].x + cx*w*0.85, spine[i+1].y + cy*w*0.85);
    ctx.lineTo(spine[i+1].x - cx*w*0.85, spine[i+1].y - cy*w*0.85);
    ctx.lineTo(spine[i].x - cx*w, spine[i].y - cy*w);
    ctx.closePath();
    ctx.strokeStyle = `rgba(200,230,200,${0.6-t*0.3})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
}

function drawRibs() {
  for (let r = 0; r < 14; r++) {
    const idx = 4 + r*2;
    if (idx >= spine.length-1) continue;
    const seg = spine[idx];
    const next = spine[idx+1];
    const a = ang(seg, next);
    const perp = a + Math.PI/2;
    const t = r/14;
    const rl = 22*(1-t*0.6);
    for (let s of [-1,1]) {
      const bx = seg.x + s*Math.cos(perp)*3, by = seg.y + s*Math.sin(perp)*3;
      const ex = bx + s*Math.cos(perp)*rl + Math.cos(a)*rl*0.4;
      const ey = by + s*Math.sin(perp)*rl + Math.sin(a)*rl*0.4;
      ctx.beginPath();
      ctx.moveTo(bx,by);
      ctx.quadraticCurveTo(bx+s*Math.cos(perp)*rl*0.6, by+s*Math.sin(perp)*rl*0.6, ex, ey);
      ctx.strokeStyle = `rgba(180,220,180,${0.55-t*0.2})`;
      ctx.lineWidth = 0.8; ctx.stroke();
    }
  }
}

function drawScutes() {
  for (let i = 5; i < spine.length-2; i += 3) {
    const t = i/spine.length;
    const w = 5*(1-t*0.5);
    const a = ang(spine[i], spine[i+1]);
    ctx.save(); ctx.translate(spine[i].x, spine[i].y); ctx.rotate(a);
    ctx.beginPath(); ctx.moveTo(0,-w); ctx.lineTo(6,0); ctx.lineTo(0,w);
    ctx.strokeStyle=`rgba(160,210,160,${0.4-t*0.2})`; ctx.lineWidth=0.6; ctx.stroke();
    ctx.restore();
  }
}

function drawHead() {
  const s0 = spine[0], s1 = spine[1];
  const a = ang(s1, s0);
  ctx.save(); ctx.translate(s0.x, s0.y); ctx.rotate(a);
  ctx.strokeStyle='rgba(210,235,210,0.85)'; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.ellipse(12,0,14,7,0,0,Math.PI*2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(16,-3); ctx.lineTo(24,-2.5);
  ctx.moveTo(16,3);  ctx.lineTo(24,2.5);
  ctx.stroke();
  ctx.beginPath(); ctx.arc(6,-3,2,0,Math.PI*2);
  ctx.fillStyle='rgba(180,255,180,0.5)'; ctx.fill();
  ctx.beginPath(); ctx.arc(6.5,-3,0.8,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.9)'; ctx.fill();
  ctx.restore();
}

function drawCursor(x, y) {
  ctx.save();
  ctx.strokeStyle='rgba(120,255,120,0.5)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(x-6,y); ctx.lineTo(x+6,y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,y-6); ctx.lineTo(x,y+6); ctx.stroke();
  ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2);
  ctx.fillStyle='rgba(120,255,120,0.8)'; ctx.fill();
  ctx.restore();
}

const DELAY = 18;
const SWING_SPEED = 0.13;
const STEP_DIST = 28;

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  trail.unshift({x: mouse.x, y: mouse.y});
  if (trail.length > TRAIL_LEN) trail.pop();

  const target = trail[Math.min(DELAY, trail.length-1)];

  // Speed
  const dx = target.x - prevTarget.x, dy = target.y - prevTarget.y;
  speed = Math.sqrt(dx*dx + dy*dy);
  prevTarget.x = target.x; prevTarget.y = target.y;

  followChain(spine, target.x, target.y, SEG);

  // Update walk phase based on speed
  walkPhase += Math.min(speed * 0.04, 0.12);

  // Update each leg
  legDefs.forEach((def, i) => {
    const state = legState[i];
    const hip = getHipPos(def);
    const ideal = getIdealFoot(def, hip);

    if (state.planted) {
      // Check if foot is too far from ideal
      const fdx = ideal.x - state.footX;
      const fdy = ideal.y - state.footY;
      const footDist = Math.sqrt(fdx*fdx + fdy*fdy);

      // Step trigger: distance too far OR walk phase matches this leg
      const phaseMatch = (Math.sin(walkPhase + def.phaseOffset) > 0.6) && speed > 1.5;
      if (footDist > STEP_DIST || phaseMatch) {
        state.planted = false;
        state.swingT = 0;
        state.fromX = state.footX;
        state.fromY = state.footY;
        // Step ahead of ideal
        const bodyA = ang(spine[def.spineIdx+1], spine[def.spineIdx]);
        state.toX = ideal.x + Math.cos(bodyA) * 10;
        state.toY = ideal.y + Math.sin(bodyA) * 10;
      }
    } else {
      state.swingT += SWING_SPEED + speed * 0.008;
      const t = Math.min(state.swingT, 1);
      // Smooth step interpolation
      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      state.footX = state.fromX + (state.toX - state.fromX) * ease;
      state.footY = state.fromY + (state.toY - state.fromY) * ease;
      if (state.swingT >= 1) {
        state.planted = true;
        state.footX = state.toX;
        state.footY = state.toY;
      }
    }
  });

  drawSpine();
  drawRibs();
  drawScutes();
  legDefs.forEach((def, i) => drawLeg(def, legState[i]));
  drawHead();
  drawCursor(mouse.x, mouse.y);
  requestAnimationFrame(animate);
}
animate();
</script>
