<canvas id="c" style="display:block;width:100%;background:#0a0a0f;cursor:none;border-radius:12px;touch-action:none"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 700;
canvas.height = 420;

const mouse = {x: 350, y: 210};
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (canvas.width / r.width);
  mouse.y = (e.clientY - r.top) * (canvas.height / r.height);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.touches[0].clientX - r.left) * (canvas.width / r.width);
  mouse.y = (e.touches[0].clientY - r.top) * (canvas.height / r.height);
}, {passive: false});

// Smooth body position (delayed)
const body = {x: 350, y: 210, angle: 0};
let prevBodyX = 350, prevBodyY = 210;
let speed = 0;
let walkPhase = 0;

// 8 legs: 4 per side
// Each leg: hipAngle (relative to body), len1, len2, phaseOffset
const LEG_DEFS = [
  {side:  1, hipOff: -0.5, len1: 40, len2: 38, phaseOffset: 0},
  {side:  1, hipOff:  0.1, len1: 44, len2: 42, phaseOffset: Math.PI},
  {side:  1, hipOff:  0.7, len1: 42, len2: 40, phaseOffset: 0},
  {side:  1, hipOff:  1.3, len1: 36, len2: 34, phaseOffset: Math.PI},
  {side: -1, hipOff: -0.5, len1: 40, len2: 38, phaseOffset: Math.PI},
  {side: -1, hipOff:  0.1, len1: 44, len2: 42, phaseOffset: 0},
  {side: -1, hipOff:  0.7, len1: 42, len2: 40, phaseOffset: Math.PI},
  {side: -1, hipOff:  1.3, len1: 36, len2: 34, phaseOffset: 0},
];

const legState = LEG_DEFS.map((def, i) => {
  const hipX = 350 + def.side * 10;
  const hipY = 210;
  const idealX = hipX + def.side * (def.len1 + def.len2) * 0.55;
  const idealY = hipY + def.hipOff * 30;
  return {
    footX: idealX, footY: idealY,
    planted: true,
    swingT: 1,
    fromX: idealX, fromY: idealY,
    toX: idealX, toY: idealY,
  };
});

function getHipPos(def) {
  const a = body.angle;
  const perp = a + Math.PI / 2;
  const hipDist = 9;
  const fwdOffset = -def.hipOff * 8;
  return {
    x: body.x + def.side * Math.cos(perp) * hipDist + Math.cos(a) * fwdOffset,
    y: body.y + def.side * Math.sin(perp) * hipDist + Math.sin(a) * fwdOffset,
  };
}

function getIdealFoot(def, hip) {
  const a = body.angle;
  const perp = a + Math.PI / 2;
  const spread = def.len1 * 0.85;
  const fwd = -def.hipOff * 22;
  return {
    x: hip.x + def.side * Math.cos(perp) * spread + Math.cos(a) * fwd,
    y: hip.y + def.side * Math.sin(perp) * spread + Math.sin(a) * fwd,
  };
}

function solveIK(hx, hy, fx, fy, l1, l2) {
  const dx = fx - hx, dy = fy - hy;
  let dist = Math.sqrt(dx*dx + dy*dy);
  const maxR = l1 + l2 - 1;
  if (dist > maxR) {
    const a = Math.atan2(dy, dx);
    fx = hx + Math.cos(a)*maxR;
    fy = hy + Math.sin(a)*maxR;
    dist = maxR;
  }
  const cosA = Math.max(-1, Math.min(1, (dist*dist + l1*l1 - l2*l2) / (2*dist*l1)));
  const ang1 = Math.acos(cosA);
  const ang0 = Math.atan2(fy - hy, fx - hx);
  return {
    kneeX: hx + Math.cos(ang0 + ang1) * l1,
    kneeY: hy + Math.sin(ang0 + ang1) * l1,
    footX: fx, footY: fy,
  };
}

function drawLeg(def, state) {
  const hip = getHipPos(def);
  const ik = solveIK(hip.x, hip.y, state.footX, state.footY, def.len1, def.len2);
  const lift = state.planted ? 0 : -Math.sin(Math.min(state.swingT, 1) * Math.PI) * 12;

  const alpha = 0.85;
  ctx.strokeStyle = `rgba(180,140,220,${alpha})`;
  ctx.lineWidth = 1.6;
  ctx.lineCap = 'round';

  // Upper leg
  ctx.beginPath();
  ctx.moveTo(hip.x, hip.y);
  ctx.lineTo(ik.kneeX, ik.kneeY);
  ctx.stroke();

  // Lower leg
  ctx.lineWidth = 1.1;
  ctx.beginPath();
  ctx.moveTo(ik.kneeX, ik.kneeY);
  ctx.lineTo(ik.footX, ik.footY + lift);
  ctx.stroke();

  // Knee
  ctx.beginPath();
  ctx.arc(ik.kneeX, ik.kneeY, 2.2, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(200,160,240,0.9)';
  ctx.fill();

  // Claw tips
  const fa = Math.atan2(ik.footY - ik.kneeY, ik.footX - ik.kneeX);
  const fx = ik.footX, fy = ik.footY + lift;
  for (let c = -1; c <= 1; c += 2) {
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.lineTo(fx + Math.cos(fa + c*0.3)*7, fy + Math.sin(fa + c*0.3)*7);
    ctx.lineWidth = 0.7;
    ctx.stroke();
  }
}

function drawBody() {
  const a = body.angle;
  ctx.save();
  ctx.translate(body.x, body.y);
  ctx.rotate(a);

  // Abdomen (back)
  ctx.beginPath();
  ctx.ellipse(-18, 0, 22, 14, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(80,40,110,0.9)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(180,140,220,0.7)';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // Abdomen markings
  ctx.strokeStyle = 'rgba(200,160,255,0.35)';
  ctx.lineWidth = 0.7;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.ellipse(-18, 0, 10 + i*4, 5 + i*2, 0, 0, Math.PI*2);
    ctx.stroke();
  }

  // Cephalothorax (front)
  ctx.beginPath();
  ctx.ellipse(8, 0, 14, 11, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(60,30,90,0.95)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(180,140,220,0.8)';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // Eyes — 2 rows
  const eyePositions = [
    {x: 14, y: -4}, {x: 14, y: 4},
    {x: 11, y: -7}, {x: 11, y: 7},
  ];
  eyePositions.forEach(ep => {
    ctx.beginPath();
    ctx.arc(ep.x, ep.y, 2.2, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(200,240,200,0.95)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(ep.x+0.3, ep.y, 0.9, 0, Math.PI*2);
    ctx.fillStyle = '#050505';
    ctx.fill();
  });

  // Chelicerae (fangs)
  ctx.strokeStyle = 'rgba(160,120,200,0.9)';
  ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(20, -3); ctx.lineTo(26, -6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(20,  3); ctx.lineTo(26,  6); ctx.stroke();
  ctx.beginPath(); ctx.arc(26, -6, 2, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(140,80,180,0.9)'; ctx.fill();
  ctx.beginPath(); ctx.arc(26,  6, 2, 0, Math.PI*2); ctx.fill();

  // Pedipalps
  ctx.strokeStyle = 'rgba(160,120,200,0.7)';
  ctx.lineWidth = 0.9;
  ctx.beginPath(); ctx.moveTo(18,-5); ctx.quadraticCurveTo(24,-10,28,-8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(18, 5); ctx.quadraticCurveTo(24, 10,28, 8); ctx.stroke();

  // Spinnerets
  ctx.beginPath(); ctx.arc(-38, -3, 2.5, 0, Math.PI*2);
  ctx.fillStyle='rgba(120,80,160,0.8)'; ctx.fill();
  ctx.beginPath(); ctx.arc(-38,  3, 2.5, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawCursor(x, y) {
  ctx.save();
  ctx.strokeStyle = 'rgba(200,160,255,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x-6,y); ctx.lineTo(x+6,y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,y-6); ctx.lineTo(x,y+6); ctx.stroke();
  ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2);
  ctx.fillStyle='rgba(200,160,255,0.9)'; ctx.fill();
  ctx.restore();
}

const DELAY = 16;
const TRAIL = Array.from({length: 60}, () => ({x:350, y:210}));

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  TRAIL.unshift({x: mouse.x, y: mouse.y});
  if (TRAIL.length > 60) TRAIL.pop();

  const target = TRAIL[Math.min(DELAY, TRAIL.length-1)];

  // Smooth body
  body.x += (target.x - body.x) * 0.18;
  body.y += (target.y - body.y) * 0.18;

  const dx = body.x - prevBodyX, dy = body.y - prevBodyY;
  speed = Math.sqrt(dx*dx + dy*dy);
  if (speed > 0.5) {
    body.angle += (Math.atan2(dy, dx) - body.angle) * 0.15;
  }
  prevBodyX = body.x; prevBodyY = body.y;

  walkPhase += Math.min(speed * 0.06, 0.15);

  // Update legs
  LEG_DEFS.forEach((def, i) => {
    const state = legState[i];
    const hip = getHipPos(def);
    const ideal = getIdealFoot(def, hip);

    if (state.planted) {
      const fdx = ideal.x - state.footX;
      const fdy = ideal.y - state.footY;
      const dist = Math.sqrt(fdx*fdx + fdy*fdy);
      const phaseStep = Math.sin(walkPhase + def.phaseOffset) > 0.55 && speed > 0.8;
      if (dist > 32 || phaseStep) {
        state.planted = false;
        state.swingT = 0;
        state.fromX = state.footX;
        state.fromY = state.footY;
        const ba = body.angle;
        state.toX = ideal.x + Math.cos(ba) * 12;
        state.toY = ideal.y + Math.sin(ba) * 12;
      }
    } else {
      state.swingT += 0.14 + speed * 0.01;
      const t = Math.min(state.swingT, 1);
      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      state.footX = state.fromX + (state.toX - state.fromX) * ease;
      state.footY = state.fromY + (state.toY - state.fromY) * ease;
      if (state.swingT >= 1) {
        state.planted = true;
        state.footX = state.toX;
        state.footY = state.toY;
      }
    }
  });

  // Draw back legs first, then body, then front legs
  [4,5,6,7].forEach(i => drawLeg(LEG_DEFS[i], legState[i]));
  [0,1,2,3].forEach(i => drawLeg(LEG_DEFS[i], legState[i]));
  drawBody();
  drawCursor(mouse.x, mouse.y);

  requestAnimationFrame(animate);
}
animate();
</script>
