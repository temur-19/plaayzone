{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoFinder | Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/foradmin.css' %}">
</head>
<body class="font-sans flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#f4ebd9] border-r border-[#e6d5ba] hidden md:flex flex-col justify-between h-full">
        <div>
            <div class="h-16 flex items-center px-6 border-b border-[#e6d5ba]">
                <span class="text-xl font-black text-amber-700">
                    <i class="fa-solid fa-gears mr-2"></i>GEO-ADMIN
                </span>
            </div>
            <div class="p-4">
                <a href="#" class="flex items-center space-x-3 px-4 py-2.5 rounded-lg bg-amber-700 text-white font-medium">
                    <i class="fa-solid fa-map-location-dot w-5"></i>
                    <span>Lokatsiyalar</span>
                </a>
            </div>
        </div>
        <div class="p-4 border-t border-[#e6d5ba]">
            <button onclick="handleLogout()" class="w-full flex items-center space-x-3 px-4 py-2.5 rounded-lg bg-red-100 hover:bg-red-200 text-red-700 font-bold border border-red-200 transition cursor-pointer text-left">
                <i class="fa-solid fa-right-from-bracket w-5"></i>
                <span>Chiqish</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 h-full overflow-hidden">
        <header class="h-16 bg-[#f4ebd9] border-b border-[#e6d5ba] flex items-center px-6 shrink-0">
            <h1 class="text-lg font-bold text-amber-900">Lokatsiyalar boshqaruvi</h1>
        </header>

        <div class="p-6 flex-1 overflow-y-auto">

            <div class="bg-white p-4 rounded-xl border border-[#e6d5ba] mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 shadow-xs">
                <div class="flex flex-1 flex-col sm:flex-row gap-2">
                    <div class="relative flex-1 max-w-xs">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400 text-sm"></i>
                        <input type="text" id="admin-search" oninput="filterTableData()" placeholder="Nomi bo'yicha qidirish..."
                            class="w-full pl-9 pr-4 py-2 bg-[#fdfcf9] border border-[#e6d5ba] rounded-lg text-sm text-gray-800 focus:outline-none focus:border-amber-600">
                    </div>
                    <select id="admin-filter" onchange="filterTableData()"
                        class="px-3 py-2 bg-[#fdfcf9] border border-[#e6d5ba] rounded-lg text-sm text-gray-700 focus:outline-none focus:border-amber-600">
                        <option value="">Barcha kategoriyalar</option>
                        <option value="stadium">Mini-stadion</option>
                        <option value="playstation">Playstation</option>
                        <option value="pc_club">Kompyuter klub</option>
                        <option value="billiard">Billiard</option>
                    </select>
                </div>
                <button onclick="openFormModal()"
                    class="bg-amber-700 hover:bg-amber-800 text-white font-medium text-sm px-4 py-2 rounded-lg flex items-center space-x-2 transition shadow-md cursor-pointer">
                    <i class="fa-solid fa-plus"></i>
                    <span>Yangi Lokatsiya</span>
                </button>
            </div>

            <div class="bg-white rounded-xl border border-[#e6d5ba] overflow-hidden shadow-xs">
                <div class="overflow-x-auto">
                    <table class="w-full border-collapse text-left text-sm text-gray-700">
                        <thead class="bg-[#f4ebd9]/60 text-xs font-semibold uppercase text-amber-900 border-b border-[#e6d5ba]">
                            <tr>
                                <th class="px-6 py-4">ID</th>
                                <th class="px-6 py-4">Rasm</th>
                                <th class="px-6 py-4">Kategoriya</th>
                                <th class="px-6 py-4">Nomi</th>
                                <th class="px-6 py-4">Koordinatalar (Lat / Lon)</th>
                                <th class="px-6 py-4 text-right">Amallar</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y divide-[#e6d5ba]"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <div id="crud-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-xs flex items-center justify-center p-4 z-50">
        <div class="bg-[#fbf8f3] border border-[#e6d5ba] rounded-xl w-full max-w-lg shadow-2xl overflow-hidden">
            <div class="px-6 py-4 border-b border-[#e6d5ba] flex justify-between items-center bg-[#f4ebd9]">
                <h3 id="modal-title" class="text-base font-bold text-amber-900">Yangi joy qo'shish</h3>
                <button onclick="closeFormModal()" class="text-amber-800 hover:text-black text-lg cursor-pointer">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <form id="crud-form" onsubmit="handleFormSubmit(event)" class="p-6 space-y-4">
                <input type="hidden" id="form-id">

                <div>
                    <label class="block text-xs font-semibold uppercase text-amber-900 mb-1.5">Obyekt Nomi</label>
                    <input type="text" id="form-name" required
                        class="w-full px-3 py-2 bg-white border border-[#e6d5ba] rounded-lg text-sm text-gray-800 focus:outline-none focus:border-amber-600">
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase text-amber-900 mb-1.5">Kategoriya</label>
                    <select id="form-category"
                        class="w-full px-3 py-2 bg-white border border-[#e6d5ba] rounded-lg text-sm text-gray-800 focus:outline-none">
                        <option value="stadium">Mini-stadion</option>
                        <option value="playstation">Playstation</option>
                        <option value="pc_club">Kompyuter klub</option>
                        <option value="billiard">Billiard</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase text-amber-900 mb-1.5">Kenglik (Lat)</label>
                        <input type="number" step="any" id="form-lat" required
                            class="w-full px-3 py-2 bg-white border border-[#e6d5ba] rounded-lg text-sm text-gray-800 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase text-amber-900 mb-1.5">Uzunlik (Lon)</label>
                        <input type="number" step="any" id="form-lon" required
                            class="w-full px-3 py-2 bg-white border border-[#e6d5ba] rounded-lg text-sm text-gray-800 focus:outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase text-amber-900 mb-1.5">Obyekt Rasmi</label>
                    <input type="file" id="form-image" accept="image/*"
                        class="w-full px-3 py-2 bg-white border border-[#e6d5ba] rounded-lg text-sm text-gray-600 file:mr-4 file:py-1 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-amber-700 file:text-white hover:file:bg-amber-800">
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase text-amber-900 mb-1.5">Tavsif</label>
                    <textarea id="form-description" rows="2"
                        class="w-full px-3 py-2 bg-white border border-[#e6d5ba] rounded-lg text-sm text-gray-800 focus:outline-none"></textarea>
                </div>

                <div class="pt-4 flex justify-end space-x-2 border-t border-[#e6d5ba]">
                    <button type="button" onclick="closeFormModal()"
                        class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm cursor-pointer">Bekor qilish</button>
                    <button type="submit"
                        class="px-4 py-2 bg-amber-700 hover:bg-amber-800 text-white rounded-lg text-sm font-semibold cursor-pointer">Saqlash</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{% static 'js/foradmin.js' %}"></script>
</body>
</html>
