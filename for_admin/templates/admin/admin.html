<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy qo'shish (API)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0">Yangi joy qo'shish (API)</h4>
                </div>
                <div class="card-body">
                    <form id="locationForm">
                        <div class="mb-3">
                            <label for="category" class="form-label">Kategoriya</label>
                            <select class="form-select" id="category" required>
                                <option value="stadium">Mini-stadion</option>
                                <option value="playstation">Playstation</option>
                                <option value="pc_club">Kompyuter klub</option>
                                <option value="billiard">Billiard</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="name" class="form-label">Nomi</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="lat" class="form-label">Kenglik (Lat)</label>
                                <input type="number" step="any" class="form-control" id="lat" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="lon" class="form-label">Uzunlik (Lon)</label>
                                <input type="number" step="any" class="form-control" id="lon" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tavsif</label>
                            <textarea class="form-control" id="description" rows="3"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Rasm</label>
                            <input class="form-control" type="file" id="image" accept="image/*">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Yuborish</button>
                        </div>
                    </form>
                    <div id="message" class="mt-3 alert d-none"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('locationForm').addEventListener('submit', async function(e) {
    e.preventDefault(); // Sahifa yangilanishini to'xtatish

    // FormData obyektini yaratamiz (chunki ichida rasm bor)
    const formData = new FormData();
    formData.append('category', document.getElementById('category').value);
    formData.append('name', document.getElementById('name').value);
    formData.append('lat', document.getElementById('lat').value);
    formData.append('lon', document.getElementById('lon').value);
    formData.append('description', document.getElementById('description').value);

    const imageFile = document.getElementById('image').files[0];
    if (imageFile) {
        formData.append('image', imageFile);
    }

    const messageDiv = document.getElementById('message');

        try {
            // Django API manzilingizni yozing (masalan: /api/locations/)
            const response = await fetch('', {
                method: 'POST',
                body: formData,
                // Headers qismiga Content-Type yozilmaydi, FormData o'zi avtomat o'rnatadi
            });

        if (response.ok) {
            messageDiv.className = "mt-3 alert alert-success";
            messageDiv.textContent = "Joy muvaffaqiyatli saqlandi!";
            messageDiv.classList.remove('d-none');
            document.getElementById('locationForm').reset();
        } else {
            const errorData = await response.json();
            messageDiv.className = "mt-3 alert alert-danger";
            messageDiv.textContent = "Xatolik yuz berdi: " + JSON.stringify(errorData);
            messageDiv.classList.remove('d-none');
        }
    } catch (error) {
        messageDiv.className = "mt-3 alert alert-danger";
        messageDiv.textContent = "Server bilan aloqa uzildi!";
        messageDiv.classList.remove('d-none');
    }
});
</script>
</body>
</html>
