{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin kirish — PlayZone.uz</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">

  <style>
    .center-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .center-page::before {
      content: '';
      position: absolute;
      top: -200px; left: -150px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(245,197,24,0.07) 0%, transparent 70%);
    }
    .center-card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 2.6rem;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }
    .admin-icon-badge {
      width: 52px; height: 52px;
      border-radius: var(--r-md);
      background: var(--gold-dim);
      color: var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      margin-bottom: 1.4rem;
    }
  </style>
</head>
<body>
  <div class="center-page">
    <div class="center-card">
      <div class="admin-icon-badge"><i class="bi bi-shield-lock-fill"></i></div>
      <h1 style="font-family:var(--font-display);font-size:1.4rem;font-weight:700;margin-bottom:0.4rem;">Admin Panel</h1>
      <p style="color:var(--text-dim);font-size:0.88rem;margin-bottom:1.8rem;">PlayZone.uz boshqaruv tizimiga kirish</p>

      {% if error %}
        <div class="alert alert-error">
          <i class="bi bi-exclamation-circle"></i> {{ error }}
        </div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}

        <div class="field">
          <label for="id_username">Username</label>
          <input type="text" name="username" id="id_username" placeholder="Username" required autofocus>
        </div>

        <div class="field">
          <label for="id_password">Password</label>
          <div class="field-pw-wrap">
            <input type="password" name="password" id="id_password" placeholder="••••••••" required>
            <i class="bi bi-eye pw-toggle" onclick="togglePw(this,'id_password')"></i>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">
          <i class="bi bi-box-arrow-in-right"></i> Kirish
        </button>
      </form>

      <p class="auth-foot">
        <a href="{% url 'foruser:home' %}"><i class="bi bi-arrow-left"></i> Saytga qaytish</a>
      </p>
    </div>
  </div>

  <script>
    function togglePw(icon, inputId) {
      const input = document.getElementById(inputId);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      icon.classList.toggle('bi-eye', !isHidden);
      icon.classList.toggle('bi-eye-slash', isHidden);
    }
  </script>
</body>
</html>
