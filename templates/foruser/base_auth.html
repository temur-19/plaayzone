{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% endblock %} — PlayZone.uz</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">

  <style>
    .center-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .center-page::before {
      content: '';
      position: absolute;
      top: -200px; left: -150px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(245,197,24,0.08) 0%, transparent 70%);
    }
    .center-card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 2.6rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
    }
    .center-card .logo-txt { margin-bottom: 2rem; }
    .center-card h1 {
      font-family: var(--font-display);
      font-size: 1.45rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .center-card .card-sub {
      color: var(--text-dim);
      font-size: 0.88rem;
      line-height: 1.6;
      margin-bottom: 1.8rem;
    }
    .success-icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--emerald-dim);
      color: #4ade80;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      margin: 0 auto 1.3rem;
    }
    .error-icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--red-dim);
      color: #fca5a5;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      margin: 0 auto 1.3rem;
    }
  </style>
</head>
<body>
  <div class="center-page">
    <div class="center-card">
      <a href="{% url 'foruser:home' %}" class="logo-txt">
        <span class="logo-mark">PZ</span>
        Play<span>Zone</span>.uz
      </a>
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
